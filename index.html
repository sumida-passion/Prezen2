<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#07101f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Narabunka High School">
<meta name="application-name" content="Narabunka High School">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<title>Narabunka High School</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Yu Gothic","Hiragino Sans","Noto Sans JP",sans-serif;background:#07101f;color:#fff;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:manipulation;overscroll-behavior:none}.home{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(7,16,31,.78),rgba(7,16,31,.36)),url("./hpmain.jpg") center/cover no-repeat,#07101f}.home::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 18% 16%,rgba(247,201,109,.30),transparent 30%),linear-gradient(90deg,rgba(7,16,31,.84),rgba(7,16,31,.28) 56%,rgba(7,16,31,.78));pointer-events:none}.card{position:relative;width:min(1120px,86vw);border-radius:38px;padding:62px 66px;background:linear-gradient(135deg,rgba(255,248,234,.94),rgba(243,234,216,.84));box-shadow:0 34px 110px rgba(0,0,0,.56),inset 0 0 0 1px rgba(255,255,255,.72);backdrop-filter:blur(5px);color:#102033}.kicker{color:#b9802e;font-weight:950;letter-spacing:.18em;margin-bottom:22px;font-size:clamp(1rem,1.8vw,1.35rem)}.title{font-size:clamp(3.7rem,7.3vw,7.1rem);line-height:1.02;font-weight:950;letter-spacing:.02em;color:#08336f;text-shadow:0 5px 18px rgba(255,255,255,.45)}.subtitle{font-size:clamp(1.25rem,2.2vw,2rem);font-weight:900;margin-top:20px;color:#334155}.buttons{display:flex;gap:22px;margin-top:46px}.buttons a,.buttons button{flex:1;text-align:center;text-decoration:none;border:0;border-radius:999px;padding:20px 26px;font-size:clamp(1.05rem,1.8vw,1.35rem);font-weight:950;cursor:pointer;box-shadow:0 12px 26px rgba(0,0,0,.18);touch-action:manipulation}.primary{background:#f7c96d;color:#07101f}.secondary{background:#e9eef5;color:#08336f}.note{position:fixed;right:16px;bottom:12px;color:rgba(255,255,255,.58);font-size:12px;font-weight:800}.loading{position:fixed;left:16px;bottom:12px;color:rgba(255,255,255,.74);font-weight:900;font-size:12px}.warn{display:none;margin-top:22px;border-radius:18px;padding:14px 16px;background:rgba(255,255,255,.68);color:#7c2d12;font-weight:900;line-height:1.55}@media(max-width:760px){.card{padding:38px 30px}.buttons{flex-direction:column}.title{font-size:3.2rem}}
</style>
</head>
<body>
<main class="home">
  <section class="card">
    <div class="kicker">NARA BUNKA HIGH SCHOOL</div>
    <div class="title">Narabunka<br>High School</div>
    <div class="subtitle">探究説明から、学校紹介へ。</div>
    <div class="buttons">
      <a class="primary" id="goTankyu" href="./tankyu2.html?prezen2=1">探究説明から始める</a>
      <a class="secondary" href="./syokai2.html">学校紹介から始める</a>
    </div>
    <div class="warn" id="warn">初回だけ接続準備をしています。数秒後にもう一度「探究説明から始める」を押してください。</div>
  </section>
</main>
<div class="loading" id="status">接続準備中...</div>
<div class="note">Prezen2 / no iframe</div>
<script>
(function(){
  const status=document.getElementById('status');
  const warn=document.getElementById('warn');
  const go=document.getElementById('goTankyu');
  function setReady(){ status.textContent='接続準備OK'; }
  if(!('serviceWorker' in navigator)){ status.textContent='通常モード'; return; }
  navigator.serviceWorker.register('./sw.js?v=20260624-noiframe',{scope:'./'}).then(function(reg){
    if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
    return navigator.serviceWorker.ready;
  }).then(function(){
    if(navigator.serviceWorker.controller){ setReady(); }
    else { status.textContent='接続準備を反映中...'; location.reload(); }
  }).catch(function(){ status.textContent='通常モード'; });
  go.addEventListener('click',function(e){
    if('serviceWorker' in navigator && !navigator.serviceWorker.controller){ e.preventDefault(); warn.style.display='block'; setTimeout(()=>location.reload(),650); }
  });
})();
</script>
</body>
</html>
