<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#07101f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prezen2">
<meta name="application-name" content="Prezen2">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<title>奈良文化高校｜探究・学校紹介</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07101f;font-family:"Yu Gothic","Hiragino Sans","Noto Sans JP",sans-serif;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:manipulation;overscroll-behavior:none}
.app{position:fixed;inset:0;overflow:hidden;background:#07101f}
.part{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:#07101f;transition:opacity .75s ease, filter .75s ease, transform .75s ease}
#tankyuFrame{z-index:2;opacity:1;filter:blur(0);transform:scale(1)}
#syokaiFrame{z-index:1;opacity:0;filter:blur(12px);transform:scale(1.015);pointer-events:none;background:#fff}
.app.syokai #tankyuFrame{opacity:0;filter:blur(12px);transform:scale(.985);pointer-events:none}
.app.syokai #syokaiFrame{z-index:3;opacity:1;filter:blur(0);transform:scale(1);pointer-events:auto}
.start-menu{position:absolute;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 20% 18%,rgba(185,128,46,.18),transparent 30%),linear-gradient(135deg,#07101f,#111827 58%,#1e293b);transition:opacity .45s ease,filter .45s ease}
.start-menu.hide{opacity:0;filter:blur(10px);pointer-events:none}
.start-card{width:min(1040px,84vw);border-radius:34px;padding:58px;background:linear-gradient(135deg,rgba(255,248,234,.98),rgba(243,234,216,.94));box-shadow:0 28px 90px rgba(0,0,0,.48);color:#1d2433}
.kicker{color:#b9802e;font-weight:950;letter-spacing:.18em;margin-bottom:20px}
.title{font-size:clamp(4rem,8vw,7.5rem);line-height:1;font-weight:950;letter-spacing:.02em;color:#08336f}
.subtitle{font-size:clamp(1.4rem,2.4vw,2.2rem);font-weight:900;margin-top:20px;color:#334155}
.menu-buttons{display:flex;gap:22px;margin-top:46px}
.menu-buttons button{flex:1;border:0;border-radius:999px;padding:20px 26px;font-size:1.35rem;font-weight:950;cursor:pointer;box-shadow:0 12px 26px rgba(0,0,0,.16);touch-action:manipulation}
.primary{background:#f7c96d;color:#07101f}
.secondary{background:#e9eef5;color:#08336f}
.transition{position:absolute;inset:0;z-index:9000;pointer-events:none;background:#fff;opacity:0}
.transition.on{animation:whiteFade 1.15s ease both}
@keyframes whiteFade{0%{opacity:0}45%{opacity:1}100%{opacity:0}}
.corner-nav{position:absolute;left:14px;bottom:12px;z-index:8000;display:flex;gap:10px;opacity:.24;transition:.25s ease}
.corner-nav:hover{opacity:1}
.corner-nav button{border:0;border-radius:999px;background:rgba(8,51,111,.88);color:#fff;padding:9px 14px;font-weight:950;touch-action:manipulation}
</style>
</head>
<body>
<div class="app" id="app">
  <iframe id="tankyuFrame" class="part" title="Tankyu2"></iframe>
  <iframe id="syokaiFrame" class="part" title="Syokai2"></iframe>

  <div class="start-menu" id="startMenu">
    <div class="start-card">
      <div class="kicker">NARA BUNKA HIGH SCHOOL</div>
      <div class="title">奈良文化高校</div>
      <div class="subtitle">探究・学校紹介</div>
      <div class="menu-buttons">
        <button class="primary" id="startTankyu">探究説明から始める</button>
        <button class="secondary" id="startSyokai">学校紹介から始める</button>
      </div>
    </div>
  </div>

  <div class="transition" id="transition"></div>

  <div class="corner-nav">
    <button id="navTankyu">探究へ</button>
    <button id="navSyokai">学校紹介へ</button>
  </div>
</div>

<script>
const app = document.getElementById('app');
const tankyuFrame = document.getElementById('tankyuFrame');
const syokaiFrame = document.getElementById('syokaiFrame');
const startMenu = document.getElementById('startMenu');
const transition = document.getElementById('transition');

let tankyuLoaded = false;
let syokaiLoaded = false;

function loadTankyu(){
  if(!tankyuLoaded){
    tankyuFrame.src = './tankyu2.html';
    tankyuLoaded = true;
  }
}
function loadSyokai(){
  if(!syokaiLoaded){
    syokaiFrame.src = './syokai2.html';
    syokaiLoaded = true;
  }
}
function hideStart(){
  startMenu.classList.add('hide');
}
function goTankyu(){
  loadTankyu();
  hideStart();
  app.classList.remove('syokai');
}
function goSyokai(withFade=true){
  loadSyokai();
  hideStart();
  if(withFade){
    transition.classList.remove('on');
    void transition.offsetWidth;
    transition.classList.add('on');
    setTimeout(()=>app.classList.add('syokai'), 420);
  }else{
    app.classList.add('syokai');
  }
}
window.goTankyu = goTankyu;
window.goSyokai = goSyokai;

document.getElementById('startTankyu').addEventListener('click', goTankyu);
document.getElementById('startSyokai').addEventListener('click', ()=>goSyokai(false));
document.getElementById('navTankyu').addEventListener('click', goTankyu);
document.getElementById('navSyokai').addEventListener('click', ()=>goSyokai(true));

window.addEventListener('message', (e)=>{
  if(e.data && e.data.type === 'prezen2-goto-syokai') goSyokai(true);
});

(function(){
  document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});
  document.addEventListener('gesturechange',e=>e.preventDefault(),{passive:false});
  document.addEventListener('gestureend',e=>e.preventDefault(),{passive:false});
  document.addEventListener('contextmenu',e=>e.preventDefault());
})();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
